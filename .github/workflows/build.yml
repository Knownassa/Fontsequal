name: Build release artifacts

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  bundle:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            bundles: deb,appimage
          - os: windows-latest
            bundles: nsis,msi
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - run: bun install --frozen-lockfile
      - run: bun run tauri build --bundles ${{ matrix.bundles }}
      - uses: actions/upload-artifact@v4
        with:
          name: fontsequal-${{ runner.os }}
          path: src-tauri/target/release/bundle/**
